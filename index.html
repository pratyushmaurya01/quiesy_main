<!DOCTYPE html>
<html>
<head>
  <title>Word Search Visualizer</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f6f9;
    }

    .grid {
      display: grid;
      gap: 5px;
      justify-content: center;
      margin-top: 20px;
    }

    .cell {
      width: 50px;
      height: 50px;
      background: white;
      border: 1px solid #ccc;
      line-height: 50px;
      font-size: 20px;
      font-weight: bold;
    }

    .active { background: yellow; }
    .correct { background: lightgreen; }
    .wrong { background: lightcoral; }

    button {
      margin: 10px;
      padding: 10px;
    }

    #log {
      margin-top: 20px;
      height: 100px;
      overflow-y: auto;
      border: 1px solid #ccc;
      background: white;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>Word Search Visualizer</h2>

<input id="word" placeholder="Enter word" />
<button onclick="start()">Start</button>
<button onclick="nextStep()">Next Step</button>

<div id="grid" class="grid"></div>

<div id="log"></div>

<script>
let board = [
  ['a','b','c','e'],
  ['s','f','c','s'],
  ['a','d','e','e']
];

let word = "";
let steps = [];
let stepIndex = 0;

function renderGrid() {
  let grid = document.getElementById("grid");
  grid.style.gridTemplateColumns = `repeat(${board[0].length}, 50px)`;
  grid.innerHTML = "";

  for (let i = 0; i < board.length; i++) {
    for (let j = 0; j < board[0].length; j++) {
      let div = document.createElement("div");
      div.className = "cell";
      div.id = `cell-${i}-${j}`;
      div.innerText = board[i][j];
      grid.appendChild(div);
    }
  }
}

function log(msg) {
  document.getElementById("log").innerHTML += msg + "<br>";
}

function dfs(r, c, idx, visited) {
  if (idx === word.length) return true;

  if (
    r < 0 || c < 0 ||
    r >= board.length || c >= board[0].length ||
    visited[r][c] ||
    board[r][c] !== word[idx]
  ) {
    steps.push({r, c, type: "wrong", msg: `Wrong at (${r},${c})`});
    return false;
  }

  steps.push({r, c, type: "active", msg: `Match ${board[r][c]} at (${r},${c})`});

  visited[r][c] = true;

  let found =
    dfs(r+1,c,idx+1,visited) ||
    dfs(r-1,c,idx+1,visited) ||
    dfs(r,c+1,idx+1,visited) ||
    dfs(r,c-1,idx+1,visited);

  if (!found) {
    steps.push({r, c, type: "wrong", msg: `Backtrack (${r},${c})`});
  } else {
    steps.push({r, c, type: "correct", msg: `Correct path (${r},${c})`});
  }

  visited[r][c] = false;
  return found;
}

function start() {
  steps = [];
  stepIndex = 0;
  document.getElementById("log").innerHTML = "";

  word = document.getElementById("word").value;

  let visited = Array.from({length: board.length}, () =>
    Array(board[0].length).fill(false)
  );

  for (let i = 0; i < board.length; i++) {
    for (let j = 0; j < board[0].length; j++) {
      dfs(i, j, 0, visited);
    }
  }

  renderGrid();
}

function nextStep() {
  if (stepIndex >= steps.length) return;

  let step = steps[stepIndex];

  let cell = document.getElementById(`cell-${step.r}-${step.c}`);
  if (cell) {
    cell.classList.remove("active", "wrong", "correct");
    cell.classList.add(step.type);
  }

  log(step.msg);

  stepIndex++;
}

renderGrid();
</script>

</body>
</html>
